<!DOCTYPE html>
<html lang="zh-Hant" data-turbo="true">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>房東設定 · 在地精選 · host-pocket</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&family=Noto+Sans+TC:wght@400;700;900&display=swap" rel="stylesheet">
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        hp: {
                            coral: '#FF5B3E',
                            dark: '#1F1A18',
                            bgLight: '#FAF8F5',
                            border: '#EBE5DF',
                            muted: '#8C807A'
                        }
                    },
                    fontFamily: { sans: ['Inter', 'Noto Sans TC', 'sans-serif'] }
                }
            }
        };
    </script>
    <script src="/js/vendor/turbo.umd.js"></script>
    <script src="/js/vendor/stimulus.umd.js"></script>
    <script src="/js/hp-card.js"></script>
    <script src="/js/hp-collapse.js"></script>
</head>
<body class="bg-hp-bgLight min-h-screen font-sans text-hp-dark text-xs">
    <header class="bg-white border-b border-hp-border px-5 py-4 sticky top-0 z-20">
        <div class="max-w-3xl mx-auto flex items-center justify-between gap-3">
            <div>
                <p class="text-[10px] font-bold uppercase tracking-widest text-hp-muted">host-pocket · 房東</p>
                <h1 class="text-sm font-black mt-0.5">在地精選設定</h1>
            </div>
            <a href="/index.html" class="text-xs font-bold text-hp-coral hover:underline shrink-0">← 返回 App</a>
        </div>
    </header>

    <main class="max-w-3xl mx-auto p-5 space-y-4 pb-16"
          data-controller="host-settings"
          data-host-settings-listing-selector-outlet="#listing-selector-panel"
          data-host-settings-content-preset-picker-outlet="#content-preset-picker"
          data-host-settings-host-preview-outlet="#host-preview-drawer"
          data-action="listing-selector:load->host-settings#loadListingFromEvent content-preset-picker:imported->host-settings#importPresetFromEvent content-preset-picker:error->host-settings#showPresetError">

        <!-- partial: listing_selector (Rails _listing_selector.html.erb equivalent) -->
        <section id="listing-selector-panel" class="hp-card hp-card--stack" data-controller="listing-selector">
            <div>
                <label for="listingIdInput" class="block text-[10px] font-bold uppercase tracking-wider text-hp-muted mb-1.5">房源代碼 / Listing ID</label>
                <div class="flex flex-wrap gap-2">
                    <input id="listingIdInput" type="text" placeholder="TAIPEI-CITY 或 Airbnb rooms/ 後的數字"
                           data-listing-selector-target="input"
                           data-action="keydown.enter->listing-selector#load"
                           class="flex-1 min-w-[200px] px-3 py-2.5 rounded-xl border border-hp-border font-mono uppercase focus:outline-none focus:border-hp-coral">
                    <button type="button" data-action="click->listing-selector#load"
                            class="px-4 py-2.5 rounded-xl bg-hp-dark text-white text-xs font-bold hover:bg-hp-dark/90 transition">
                        載入
                    </button>
                </div>
                <div class="flex flex-wrap gap-2 mt-3">
                    <span class="text-[10px] text-hp-muted w-full">示範主題：</span>
                    <button type="button" data-demo-id="TAIPEI-CITY" data-action="click->listing-selector#selectDemo" class="px-2.5 py-1 rounded-lg border border-hp-border bg-hp-bgLight text-[10px] font-bold hover:border-hp-coral">台北</button>
                    <button type="button" data-demo-id="UK-LONDON" data-action="click->listing-selector#selectDemo" class="px-2.5 py-1 rounded-lg border border-hp-border bg-hp-bgLight text-[10px] font-bold hover:border-hp-coral">倫敦</button>
                    <button type="button" data-demo-id="VILNIUS-OLDTOWN" data-action="click->listing-selector#selectDemo" class="px-2.5 py-1 rounded-lg border border-hp-border bg-hp-bgLight text-[10px] font-bold hover:border-hp-coral">維爾紐斯</button>
                    <button type="button" data-demo-id="RIO-COPACABANA" data-action="click->listing-selector#selectDemo" class="px-2.5 py-1 rounded-lg border border-hp-border bg-hp-bgLight text-[10px] font-bold hover:border-hp-coral">里約</button>
                </div>
                <!-- partial: content_preset_picker -->
                <div id="content-preset-picker" data-controller="content-preset-picker" class="flex flex-wrap gap-2 mt-3 pt-3 border-t border-hp-border/70">
                    <span class="text-[10px] text-hp-muted w-full">內容範本（一鍵帶入，與上方示範主題不同）：</span>
                    <button type="button" data-content-preset-picker-target="button" data-preset-id="TAIPEI-CITY" data-action="click->content-preset-picker#import" aria-pressed="false" class="hp-preset-btn px-2.5 py-1 rounded-lg border border-hp-coral/30 bg-hp-coral/5 text-[10px] font-bold text-hp-coral hover:bg-hp-coral/10 transition disabled:opacity-50 aria-pressed:bg-hp-coral/15 aria-pressed:border-hp-coral/50">台北範本</button>
                    <button type="button" data-content-preset-picker-target="button" data-preset-id="UK-LONDON" data-action="click->content-preset-picker#import" aria-pressed="false" class="hp-preset-btn px-2.5 py-1 rounded-lg border border-hp-coral/30 bg-hp-coral/5 text-[10px] font-bold text-hp-coral hover:bg-hp-coral/10 transition disabled:opacity-50 aria-pressed:bg-hp-coral/15 aria-pressed:border-hp-coral/50">倫敦範本</button>
                    <button type="button" data-content-preset-picker-target="button" data-preset-id="VILNIUS-OLDTOWN" data-action="click->content-preset-picker#import" aria-pressed="false" class="hp-preset-btn px-2.5 py-1 rounded-lg border border-hp-coral/30 bg-hp-coral/5 text-[10px] font-bold text-hp-coral hover:bg-hp-coral/10 transition disabled:opacity-50 aria-pressed:bg-hp-coral/15 aria-pressed:border-hp-coral/50">維爾紐斯範本</button>
                    <button type="button" data-content-preset-picker-target="button" data-preset-id="RIO-COPACABANA" data-action="click->content-preset-picker#import" aria-pressed="false" class="hp-preset-btn px-2.5 py-1 rounded-lg border border-hp-coral/30 bg-hp-coral/5 text-[10px] font-bold text-hp-coral hover:bg-hp-coral/10 transition disabled:opacity-50 aria-pressed:bg-hp-coral/15 aria-pressed:border-hp-coral/50">里約範本</button>
                </div>
            </div>
        </section>

        <turbo-frame id="host_settings_form"
                     data-host-settings-target="formFrame"
                     data-action="turbo:frame-load->host-settings#formFrameLoaded turbo:frame-missing->host-settings#handleFrameMissing">
            <div class="hp-card p-6 text-center text-xs text-hp-muted" aria-busy="true">載入設定中…</div>
        </turbo-frame>

        <p class="text-[10px] text-hp-muted leading-relaxed px-1">
            儲存後，在 App 輸入相同 Listing ID 配對即可看到更新（跨裝置同步，需後端已設定 DATABASE_URL）。
            清除自訂會恢復示範預設內容。
            詳見 <a href="host-manual.md" class="text-hp-coral underline">host-manual.md</a>。
        </p>
    </main>

    <!-- partial: host_preview_drawer -->
    <div id="host-preview-drawer"
         data-controller="host-preview"
         data-action="keydown@window->host-preview#closeOnEscape"
         data-host-preview-target="drawer"
         class="hp-preview-drawer"
         aria-hidden="true">
        <div class="hp-preview-backdrop" aria-hidden="true" data-action="click->host-preview#close"></div>
        <aside class="hp-preview-panel" role="dialog" aria-modal="true" aria-labelledby="previewTitle">
            <header class="hp-preview-header">
                <div class="min-w-0">
                    <p class="text-[10px] font-bold uppercase tracking-widest text-hp-muted">Guest 預覽</p>
                    <h2 id="previewTitle" data-host-preview-target="title" class="text-xs font-black truncate mt-0.5">App 預覽</h2>
                </div>
                <button type="button" data-host-preview-target="closeBtn" data-action="click->host-preview#close" class="shrink-0 w-9 h-9 rounded-xl border border-hp-border bg-white hover:border-hp-coral text-hp-muted hover:text-hp-coral transition" aria-label="關閉預覽">
                    <i class="fa-solid fa-xmark"></i>
                </button>
            </header>
            <div class="hp-preview-frame-wrap">
                <iframe data-host-preview-target="frame" title="App 預覽" class="hp-preview-frame" loading="lazy"></iframe>
            </div>
        </aside>
    </div>

    <style>
        .field-label { display: block; font-size: 10px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.05em; color: #8C807A; }
        .field-input { width: 100%; padding: 0.625rem 0.75rem; border-radius: 0.75rem; border: 1px solid #EBE5DF; font-size: 12px; }
        .field-input:focus { outline: none; border-color: #FF5B3E; }

        .hp-preview-drawer { position: fixed; inset: 0; z-index: 50; pointer-events: none; }
        .hp-preview-drawer.is-open { pointer-events: auto; }
        .hp-preview-backdrop {
            position: absolute; inset: 0; background: rgba(31, 26, 24, 0.35);
            opacity: 0; transition: opacity 0.3s ease;
        }
        .hp-preview-drawer.is-open .hp-preview-backdrop { opacity: 1; }
        .hp-preview-panel {
            position: absolute; top: 0; right: 0; bottom: 0;
            width: min(420px, 100vw);
            background: #FAF8F5;
            border-left: 1px solid #EBE5DF;
            box-shadow: -12px 0 40px rgba(31, 26, 24, 0.12);
            display: flex; flex-direction: column;
            transform: translateX(100%);
            transition: transform 0.32s cubic-bezier(0.22, 1, 0.36, 1);
        }
        .hp-preview-drawer.is-open .hp-preview-panel { transform: translateX(0); }
        .hp-preview-header {
            display: flex; align-items: center; justify-content: space-between; gap: 0.75rem;
            padding: 1rem 1rem 0.75rem;
            background: white; border-bottom: 1px solid #EBE5DF;
        }
        .hp-preview-frame-wrap { flex: 1; min-height: 0; padding: 0.75rem; background: #EBE5DF; }
        .hp-preview-frame {
            width: 100%; height: 100%;
            border: 0; border-radius: 1.25rem;
            background: white;
            box-shadow: 0 8px 24px rgba(31, 26, 24, 0.08);
        }
        body.hp-preview-open { overflow: hidden; }
    </style>

    <script src="/js/guide-defaults.js"></script>
    <script src="/js/mock-mode.js"></script>
    <script src="/js/listing-settings-api.js"></script>
    <script src="/js/host-guide-settings.js"></script>
    <script src="/js/host-settings-presets.js"></script>
    <script src="/js/partials-client.js"></script>
    <script src="/js/controllers/application.js"></script>
    <script src="/js/controllers/listing_selector_controller.js"></script>
    <script src="/js/controllers/content_preset_picker_controller.js"></script>
    <script src="/js/controllers/host_preview_controller.js"></script>
    <script src="/js/controllers/host_settings_controller.js"></script>
</body>
</html>
