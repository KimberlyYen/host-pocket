<!DOCTYPE html>
<html lang="zh-Hant" data-turbo="true">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>編輯住宿指南 · host-pocket</title>
    <link rel="icon" href="/pocket-icon.svg" type="image/svg+xml">
    <link rel="icon" href="/pocket-icon.png" type="image/png" sizes="32x32">
    <link rel="apple-touch-icon" href="/pocket-icon.png">
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&family=Noto+Sans+TC:wght@400;700;900&display=swap" rel="stylesheet">
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        hp: {
                            coral: '#FF5B3E',
                            dark: '#1F1A18',
                            bgLight: '#FAF8F5',
                            border: '#EBE5DF',
                            muted: '#8C807A'
                        }
                    },
                    fontFamily: { sans: ['Inter', 'Noto Sans TC', 'sans-serif'] }
                }
            }
        };
    </script>
    <script src="/js/vendor/turbo.umd.js"></script>
    <script src="/js/vendor/stimulus.umd.js"></script>
    <script src="/js/hp-card.js"></script>
    <script src="/js/hp-collapse.js"></script>
</head>
<body class="bg-hp-bgLight min-h-screen font-sans text-hp-dark text-xs">
    <header class="bg-white border-b border-hp-border px-5 py-4 sticky top-0 z-20">
        <div class="max-w-3xl mx-auto flex items-center justify-between gap-3">
            <div>
                <p class="text-[10px] font-bold uppercase tracking-widest text-hp-muted">host-pocket · 房東</p>
                <h1 class="text-sm font-black mt-0.5">編輯住宿指南</h1>
                <p class="text-[10px] text-hp-muted mt-1">Wi‑Fi、門鎖、照片，以及要推薦給房客的地點</p>
            </div>
            <a href="/" data-turbo="false" class="text-xs font-bold text-hp-coral hover:underline shrink-0 inline-flex items-center gap-1">
                <span data-global-lang="zh">&lt; 返回</span>
                <span data-global-lang="en" class="hidden">&lt; Back</span>
            </a>
        </div>
    </header>

    <main class="max-w-3xl mx-auto p-5 space-y-4 pb-16"
          data-controller="host-settings"
          data-host-settings-listing-selector-outlet="#listing-selector-panel"
          data-host-settings-host-preview-outlet="#host-preview-drawer"
          data-action="listing-selector:load->host-settings#loadListingFromEvent host-settings:attraction-selected->host-settings#attractionSelected">

        <section id="listing-selector-panel" class="hp-card hp-card--stack hp-card--panel" data-controller="listing-selector">
    <h2 class="hp-card__title"><i class="fa-solid fa-sliders text-hp-coral"></i> 選擇房源</h2>
    <div class="hp-listing-id-field">
    <label for="listingIdInput" class="hp-listing-id-field__label block text-[10px] font-bold uppercase tracking-wider text-hp-muted mb-1.5">
        <span data-global-lang="zh">房源代碼 / Listing ID</span>
        <span data-global-lang="en" class="hidden">Listing ID</span>
    </label>
    <div class="hp-listing-id-field__row flex flex-wrap gap-2">
        <input id="listingIdInput" type="text"
               data-listing-selector-target="input"
               data-action="keydown.enter->listing-selector#load"
               placeholder="TAIPEI-CITY 或 Airbnb rooms/ 後的數字"
               data-placeholder-en="TAIPEI-CITY or numbers after rooms/ in URL"
               value=""
               class="hp-listing-id-field__input flex-1 min-w-[200px] px-3 py-2.5 rounded-xl border border-hp-border font-mono uppercase focus:outline-none focus:border-hp-coral">
        <button type="button" data-action="click->listing-selector#load"
                class="hp-listing-id-field__submit px-4 py-2.5 rounded-xl bg-hp-dark text-white text-xs font-bold hover:bg-hp-dark/90 transition active:scale-[0.97]">
            <span data-global-lang="zh">載入</span>
            <span data-global-lang="en" class="hidden">Load</span>
        </button>
    </div>
</div>

    <div class="mt-3">
        <div class="hp-demo-themes flex flex-wrap gap-2" role="group" aria-label="Demo themes">
    <span class="hp-demo-themes__label text-[10px] text-hp-muted w-full">
        <span data-global-lang="zh">示範主題：</span>
        <span data-global-lang="en" class="hidden">Demo themes:</span>
    </span>
    <button type="button" data-demo-id="TAIPEI-CITY" data-action="click->listing-selector#selectDemo" class="hp-demo-themes__btn px-2.5 py-1 rounded-lg border border-hp-border bg-hp-bgLight text-[10px] font-bold hover:border-hp-coral transition-colors active:scale-[0.97]">
        <span data-global-lang="zh">台北</span>
        <span data-global-lang="en" class="hidden">Taipei</span>
    </button>
    <button type="button" data-demo-id="UK-LONDON" data-action="click->listing-selector#selectDemo" class="hp-demo-themes__btn px-2.5 py-1 rounded-lg border border-hp-border bg-hp-bgLight text-[10px] font-bold hover:border-hp-coral transition-colors active:scale-[0.97]">
        <span data-global-lang="zh">倫敦</span>
        <span data-global-lang="en" class="hidden">London</span>
    </button>
    <button type="button" data-demo-id="VILNIUS-OLDTOWN" data-action="click->listing-selector#selectDemo" class="hp-demo-themes__btn px-2.5 py-1 rounded-lg border border-hp-border bg-hp-bgLight text-[10px] font-bold hover:border-hp-coral transition-colors active:scale-[0.97]">
        <span data-global-lang="zh">維爾紐斯</span>
        <span data-global-lang="en" class="hidden">Vilnius</span>
    </button>
    <button type="button" data-demo-id="RIO-COPACABANA" data-action="click->listing-selector#selectDemo" class="hp-demo-themes__btn px-2.5 py-1 rounded-lg border border-hp-border bg-hp-bgLight text-[10px] font-bold hover:border-hp-coral transition-colors active:scale-[0.97]">
        <span data-global-lang="zh">里約</span>
        <span data-global-lang="en" class="hidden">Rio</span>
    </button>
</div>

    </div>
</section>


        <turbo-frame id="host_settings_form"
                     data-host-settings-target="formFrame"
                     data-action="turbo:frame-missing->host-settings#handleFrameMissing turbo:frame-load->host-settings#handleFrameLoad">
            <div class="hp-card hp-card--stack hp-card--panel p-6 text-center text-xs text-hp-muted" aria-busy="true">載入設定中…</div>
        </turbo-frame>
    </main>

    <!-- partial: host_preview_drawer -->
    <div id="host-preview-drawer"
         data-controller="host-preview"
         data-action="keydown@window->host-preview#closeOnEscape"
         data-host-preview-target="drawer"
         class="hp-preview-drawer"
         aria-hidden="true">
        <div class="hp-preview-backdrop" aria-hidden="true" data-action="click->host-preview#close"></div>
        <aside class="hp-preview-panel" role="dialog" aria-modal="true" aria-labelledby="previewTitle">
            <header class="hp-preview-header">
                <div class="min-w-0">
                    <p class="text-[10px] font-bold uppercase tracking-widest text-hp-muted">Guest 預覽</p>
                    <h2 id="previewTitle" data-host-preview-target="title" class="text-xs font-black truncate mt-0.5">App 預覽</h2>
                </div>
                <div class="flex items-center gap-2 shrink-0">
                    <div class="hp-preview-lang flex bg-hp-bgLight rounded-xl p-0.5 border border-hp-border" role="group" aria-label="預覽語言">
                        <button type="button" data-host-preview-target="langZhBtn" data-action="click->host-preview#switchLanguage" data-lang="zh"
                                class="hp-preview-lang__btn px-2.5 py-1 text-[10px] font-bold rounded-lg transition-all">繁中</button>
                        <button type="button" data-host-preview-target="langEnBtn" data-action="click->host-preview#switchLanguage" data-lang="en"
                                class="hp-preview-lang__btn px-2.5 py-1 text-[10px] font-bold rounded-lg transition-all">EN</button>
                    </div>
                    <button type="button" data-host-preview-target="closeBtn" data-action="click->host-preview#close" class="shrink-0 w-9 h-9 rounded-xl border border-hp-border bg-white hover:border-hp-coral text-hp-muted hover:text-hp-coral transition" aria-label="關閉預覽">
                        <i class="fa-solid fa-xmark"></i>
                    </button>
                </div>
            </header>
            <div class="hp-preview-frame-wrap">
                <iframe data-host-preview-target="frame" title="App 預覽" class="hp-preview-frame" loading="lazy"></iframe>
            </div>
        </aside>
    </div>

    <div id="attraction-picker-modal"
         data-controller="attraction-picker"
         data-action="keydown@window->attraction-picker#closeOnEscape"
         data-attraction-picker-target="modal"
         class="hp-attraction-picker"
         aria-hidden="true">
        <div class="hp-attraction-picker__backdrop" data-attraction-picker-target="backdrop" data-action="click->attraction-picker#closeOnBackdrop"></div>
        <div class="hp-attraction-picker__panel" role="dialog" aria-modal="true" aria-labelledby="attractionPickerTitle">
            <header class="hp-attraction-picker__header">
                <div class="min-w-0">
                    <h2 id="attractionPickerTitle" data-attraction-picker-target="title" class="text-xs font-black">快速選擇景點</h2>
                    <p data-attraction-picker-target="subtitle" class="text-[10px] text-hp-muted mt-0.5 truncate"></p>
                </div>
                <button type="button" data-action="click->attraction-picker#close" class="shrink-0 w-9 h-9 rounded-xl border border-hp-border bg-white hover:border-hp-coral text-hp-muted hover:text-hp-coral transition" aria-label="關閉">
                    <i class="fa-solid fa-xmark"></i>
                </button>
            </header>
            <div class="hp-attraction-picker__body">
                <p data-attraction-picker-target="empty" class="hidden text-xs text-hp-muted text-center py-8">此 Listing 尚無景點範本</p>
                <div data-attraction-picker-target="list" class="space-y-2"></div>
            </div>
        </div>
    </div>

    <style>
        .field-label { display: block; font-size: 10px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.05em; color: #8C807A; }
        .field-input { width: 100%; padding: 0.625rem 0.75rem; border-radius: 0.75rem; border: 1px solid #EBE5DF; font-size: 12px; }
        .field-input:focus { outline: none; border-color: #FF5B3E; }
        .field-input--readonly,
        .field-input:read-only {
            background: #FAF8F5;
            color: #8C807A;
            cursor: not-allowed;
        }
        .field-input--readonly:focus,
        .field-input:read-only:focus { border-color: #EBE5DF; }

        .hp-file-picker {
            display: inline-flex;
            align-items: center;
            gap: 0.375rem;
            padding: 0.5rem 0.75rem;
            border-radius: 0.75rem;
            border: 1px solid #EBE5DF;
            background: white;
            font-size: 11px;
            font-weight: 700;
            color: #1F1A18;
            cursor: pointer;
            transition: border-color 0.15s ease, color 0.15s ease;
        }
        .hp-file-picker:hover { border-color: #FF5B3E; }
        .hp-file-picker--ghost {
            background: #FAF8F5;
            color: #8C807A;
        }
        .hp-file-picker--ghost:hover { color: #FF5B3E; }

        .hp-pick-collapse > summary.hp-pick-collapse__summary {
            align-items: center;
            padding-bottom: 0.25rem;
        }
        .hp-card > .hp-pick-collapse {
            margin-top: 0;
            padding-top: 0;
            border-top: none;
        }
        .hp-pick-collapse__thumb {
            position: relative;
            width: 2.75rem;
            height: 2.75rem;
            border-radius: 0.625rem;
            border: 1px solid #EBE5DF;
            background: white;
            overflow: hidden;
            box-shadow: 0 1px 2px rgba(31, 26, 24, 0.06);
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .hp-pick-collapse__thumb-img {
            position: absolute;
            inset: 0;
            width: 100%;
            height: 100%;
            object-fit: cover;
            opacity: 0;
            transition: opacity 0.15s ease;
        }
        .hp-pick-collapse__thumb-img.is-loaded {
            opacity: 1;
        }
        .hp-pick-collapse:not([open]) .hp-collapse__body {
            margin-top: 0;
            padding-top: 0;
            border-top: 0;
        }

        .hp-preview-drawer { position: fixed; inset: 0; z-index: 50; pointer-events: none; }
        .hp-preview-drawer.is-open { pointer-events: auto; }
        .hp-preview-backdrop {
            position: absolute; inset: 0; background: rgba(31, 26, 24, 0.35);
            opacity: 0; transition: opacity 0.3s ease;
        }
        .hp-preview-drawer.is-open .hp-preview-backdrop { opacity: 1; }
        .hp-preview-panel {
            position: absolute; top: 0; right: 0; bottom: 0;
            width: min(420px, 100vw);
            background: #FAF8F5;
            border-left: 1px solid #EBE5DF;
            box-shadow: -12px 0 40px rgba(31, 26, 24, 0.12);
            display: flex; flex-direction: column;
            transform: translateX(100%);
            transition: transform 0.32s cubic-bezier(0.22, 1, 0.36, 1);
        }
        .hp-preview-drawer.is-open .hp-preview-panel { transform: translateX(0); }
        .hp-preview-header {
            display: flex; align-items: center; justify-content: space-between; gap: 0.75rem;
            padding: 1rem 1rem 0.75rem;
            background: white; border-bottom: 1px solid #EBE5DF;
        }
        .hp-preview-frame-wrap { flex: 1; min-height: 0; padding: 0.75rem; background: #EBE5DF; }
        .hp-preview-frame {
            width: 100%; height: 100%;
            border: 0; border-radius: 1.25rem;
            background: white;
            box-shadow: 0 8px 24px rgba(31, 26, 24, 0.08);
        }
        body.hp-preview-open { overflow: hidden; }

        .hp-preview-lang__btn {
            color: #8C807A;
        }
        .hp-preview-lang__btn.is-active {
            background: #FF5B3E;
            color: #fff;
            box-shadow: 0 1px 2px rgba(255, 91, 62, 0.25);
        }
        .hp-preview-lang__btn:focus-visible {
            outline: 2px solid rgba(255, 91, 62, 0.55);
            outline-offset: 1px;
        }

        .hp-pick-header { margin-bottom: 0.25rem; }

        .hp-attraction-picker { position: fixed; inset: 0; z-index: 60; pointer-events: none; }
        .hp-attraction-picker.is-open { pointer-events: auto; }
        .hp-attraction-picker__backdrop {
            position: absolute; inset: 0; background: rgba(31, 26, 24, 0.4);
            opacity: 0; transition: opacity 0.25s ease;
        }
        .hp-attraction-picker.is-open .hp-attraction-picker__backdrop { opacity: 1; }
        .hp-attraction-picker__panel {
            position: absolute; left: 50%; top: 50%;
            width: min(420px, calc(100vw - 2rem));
            max-height: min(80vh, 640px);
            background: #FAF8F5;
            border: 1px solid #EBE5DF;
            border-radius: 1.25rem;
            box-shadow: 0 24px 48px rgba(31, 26, 24, 0.18);
            display: flex; flex-direction: column;
            transform: translate(-50%, -50%) scale(0.96);
            opacity: 0;
            transition: transform 0.28s cubic-bezier(0.22, 1, 0.36, 1), opacity 0.28s ease;
        }
        .hp-attraction-picker.is-open .hp-attraction-picker__panel {
            transform: translate(-50%, -50%) scale(1);
            opacity: 1;
        }
        .hp-attraction-picker__header {
            display: flex; align-items: flex-start; justify-content: space-between; gap: 0.75rem;
            padding: 1rem 1rem 0.75rem;
            background: white;
            border-bottom: 1px solid #EBE5DF;
            border-radius: 1.25rem 1.25rem 0 0;
        }
        .hp-attraction-picker__body {
            overflow-y: auto;
            padding: 0.75rem;
        }
        body.hp-attraction-picker-open { overflow: hidden; }

        .hp-listing-id-field__input:focus-visible,
        .hp-listing-id-field__submit:focus-visible,
        .hp-demo-themes__btn:focus-visible {
            outline: 2px solid rgba(255, 91, 62, 0.55);
            outline-offset: 2px;
        }
        .hp-listing-id-field__input:focus-visible { outline: none; }
    </style>

    <script src="/js/guide-defaults.js"></script>
    <script>window.HP_MOCK_DATA = false;</script>
    <script src="/js/mock-mode.js"></script>
    <script src="/js/listing-settings-api.js"></script>
    <script src="/js/host-guide-settings.js"></script>
    <script src="/js/demo-theme-picker.js"></script>
    <script src="/js/host-settings-presets.js"></script>
    <script src="/js/host-image-upload.js"></script>
    <script src="/js/mock/attractions-by-listing.js"></script>
    <script src="/js/partials-client.js"></script>
    <script src="/js/controllers/application.js"></script>
    <script src="/js/controllers/listing_selector_controller.js"></script>
    <script src="/js/controllers/room_gallery_controller.js"></script>
    <script src="/js/controllers/experience_pick_controller.js"></script>
    <script src="/js/controllers/attraction_picker_controller.js"></script>
    <script src="/js/controllers/host_preview_controller.js"></script>
    <script src="/js/controllers/host_settings_controller.js"></script>
</body>
</html>
