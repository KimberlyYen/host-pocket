    <style>
        .field-label { display: block; font-size: 10px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.05em; color: #8C807A; }
        .field-input { width: 100%; padding: 0.625rem 0.75rem; border-radius: 0.75rem; border: 1px solid #EBE5DF; font-size: 12px; }
        .field-input:focus { outline: none; border-color: #FF5B3E; }
    </style>

    <script src="js/guide-defaults.js"></script>

    <script src="js/host-guide-settings.js"></script>
    <script>
        const listingInput = document.getElementById('listingId');
        const loadBtn = document.getElementById('loadBtn');
        const form = document.getElementById('settingsForm');
        const statusMsg = document.getElementById('statusMsg');
        const errorMsg = document.getElementById('errorMsg');
        const savedHint = document.getElementById('savedHint');
        const previewBtn = document.getElementById('previewBtn');
        const resetBtn = document.getElementById('resetBtn');

        function showStatus(text) {
            errorMsg.classList.add('hidden');
            statusMsg.textContent = text;
            statusMsg.classList.remove('hidden');
        }

        function showError(text) {
            statusMsg.classList.add('hidden');
            errorMsg.textContent = text;
            errorMsg.classList.remove('hidden');
        }

        function fillForm(data) {
            HostGuideSettings.EDITABLE_FIELDS.forEach((name) => {
                const el = form.elements.namedItem(name);
                if (el) el.value = data[name] ?? '';
            });
            const galleryEl = form.elements.namedItem('roomGalleryText');
            if (galleryEl) {
                galleryEl.value = HostGuideSettings.galleryToText(data.roomGallery);
            }
        }

        function readForm() {
            const data = {};
            HostGuideSettings.EDITABLE_FIELDS.forEach((name) => {
                const el = form.elements.namedItem(name);
                if (el) data[name] = el.value.trim();
            });
            const galleryEl = form.elements.namedItem('roomGalleryText');
            const gallery = HostGuideSettings.parseGalleryText(galleryEl?.value || '');
            if (gallery.length) {
                data.roomGallery = gallery;
                data.roomImg = gallery[0];
            }
            if (data.desc2Zh) {
                data.targetTitleZh = data.recTitle2Zh;
                data.targetTitleEn = data.recTitle2En;
                data.descZh = data.desc2Zh;
                data.descEn = data.desc2En;
                data.explorerDistZh = data.recExplorerDist2Zh || data.recDist2Zh;
                data.explorerDistEn = data.recExplorerDist2En || data.recDist2En;
            }
            return data;
        }

        async function updateSavedHint(id) {
            await HostGuideSettings.isDatabaseAvailable();
            const saved = await HostGuideSettings.loadAsync(id);
            const ids = HostGuideSettings.listSavedIds();
            const mode = HostGuideSettings.getStorageMode();
            const modeLabel = mode === 'database' ? 'Neon 資料庫' : 'localStorage（離線備援）';
            if (saved) {
                savedHint.textContent = `此房源已有自訂設定（${modeLabel} · ${new Date(saved.updatedAt || Date.now()).toLocaleString('zh-TW')}）`;
                savedHint.classList.remove('hidden');
            } else {
                savedHint.textContent = ids.length
                    ? `已自訂的房源（本機）：${ids.join('、')}`
                    : `尚未儲存自訂設定（${modeLabel}）`;
                savedHint.classList.remove('hidden');
            }
        }

        async function loadListing(rawId) {
            const id = HostGuideSettings.normalizeListingId(rawId);
            if (!id) {
                showError('請輸入房源代碼');
                return;
            }
            listingInput.value = id;
            await HostGuideSettings.ensureLoaded(id);
            const merged = HostGuideSettings.getMerged(id);
            fillForm(merged);
            form.classList.remove('hidden');
            await updateSavedHint(id);
            statusMsg.classList.add('hidden');
            errorMsg.classList.add('hidden');
        }

        loadBtn.addEventListener('click', () => loadListing(listingInput.value));
        document.querySelectorAll('.demo-preset').forEach((btn) => {
            btn.addEventListener('click', () => loadListing(btn.dataset.demoId));
        });

        form.addEventListener('submit', async (e) => {
            e.preventDefault();
            const id = HostGuideSettings.normalizeListingId(listingInput.value);
            if (!id) {
                showError('請輸入房源代碼');
                return;
            }
            try {
                await HostGuideSettings.save(id, readForm());
                await updateSavedHint(id);
                const mode = HostGuideSettings.getStorageMode() === 'database' ? 'Neon 資料庫' : 'localStorage';
                showStatus(`已儲存（${mode} · ${id}）`);
            } catch (error) {
                console.error(error);
                showError(error?.message || '儲存失敗');
            }
        });

        previewBtn.addEventListener('click', () => {
            const id = HostGuideSettings.normalizeListingId(listingInput.value);
            if (!id) {
                showError('請先載入房源');
                return;
            }
            window.open(`index.html?listing=${encodeURIComponent(id)}`, '_blank');
        });

        resetBtn.addEventListener('click', async () => {
            const id = HostGuideSettings.normalizeListingId(listingInput.value);
            if (!id) return;
            if (!confirm(`確定清除 ${id} 的自訂設定？`)) return;
            try {
                await HostGuideSettings.remove(id);
                await loadListing(id);
                showStatus(`已清除 ${id} 的自訂設定，恢復預設內容`);
            } catch (error) {
                console.error(error);
                showError(error?.message || '清除失敗');
            }
        });

        const params = new URLSearchParams(location.search);
        const initial = params.get('listing') || params.get('id') || 'TAIPEI-CITY';
        loadListing(initial);
    </script>
